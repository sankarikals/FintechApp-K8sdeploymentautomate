apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: banking
spec:
  type: NodePort
  selector:
    app: account-service
    color: blue
  ports:
    - name: http
      port: 81
      targetPort: 8081
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: banking
spec:
  type: ClusterIP
  selector:
    app: auth-service
    color: blue
  ports:
    - name: http
      port: 82
      targetPort: 8082
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: banking
spec:
  type: NodePort
  selector:
    app: transaction-service
    color: blue
  ports:
    - name: http
      port: 83
      targetPort: 8083
      protocol: TCP
