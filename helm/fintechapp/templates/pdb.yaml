{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "fintechapp.fullname" . }}
  labels:
    {{- include "fintechapp.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "fintechapp.selectorLabels" . | nindent 6 }}
{{- end }}
