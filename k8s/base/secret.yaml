# Secret template – replace base64-encoded values before applying.
# Generate: echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: fintechapp-secrets
  namespace: fintechapp
  labels:
    app.kubernetes.io/name: fintechapp
    app.kubernetes.io/component: secret
type: Opaque
data:
  # API_SECRET_KEY: <base64-encoded-value>
  # DB_PASSWORD:    <base64-encoded-value>
