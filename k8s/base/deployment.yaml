apiVersion: apps/v1
kind: Deployment
metadata:
  name: fintechapp
  namespace: fintechapp
  labels:
    app.kubernetes.io/name: fintechapp
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fintechapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fintechapp
        app.kubernetes.io/name: fintechapp
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: fintechapp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: fintechapp
          image: ghcr.io/sankarikals/fintechapp:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fintechapp-config
            - secretRef:
                name: fintechapp-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
