apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      group: apps
      version: v1
      kind: Deployment
      name: fintechapp

configMapGenerator:
  - name: fintechapp-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn

images:
  - name: ghcr.io/sankarikals/fintechapp
    newTag: latest
