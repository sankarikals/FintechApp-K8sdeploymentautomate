version: "3.9"

services:
  fintechapp:
    build:
      context: ./app
      target: production
    image: fintechapp:local
    container_name: fintechapp
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Uncomment to add a reverse proxy
